name: Test Azure OIDC (temp)

on:
  workflow_dispatch:
  push:
    branches: [feat/insiders-release-channel]
    paths: ['.github/workflows/test-azure-oidc.yml']

permissions:
  id-token: write
  contents: read

jobs:
  probe-blob:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create probe file
        run: echo "probe-${{ github.run_id }}-$(date -u +%FT%TZ)" > probe.txt

      - name: Upload probe to insiders container
        run: |
          az storage blob upload \
            --account-name ${{ vars.INSIDERS_STORAGE_ACCOUNT }} \
            --container-name ${{ vars.INSIDERS_STORAGE_CONTAINER }} \
            --name probe-${{ github.run_id }}.txt \
            --file probe.txt \
            --auth-mode login \
            --overwrite

      - name: Anonymous read back over HTTPS
        run: |
          set -e
          url="https://${{ vars.INSIDERS_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.INSIDERS_STORAGE_CONTAINER }}/probe-${{ github.run_id }}.txt"
          echo "Fetching $url"
          curl -fsSL "$url"

      - name: Delete probe blob
        if: always()
        run: |
          az storage blob delete \
            --account-name ${{ vars.INSIDERS_STORAGE_ACCOUNT }} \
            --container-name ${{ vars.INSIDERS_STORAGE_CONTAINER }} \
            --name probe-${{ github.run_id }}.txt \
            --auth-mode login || true
