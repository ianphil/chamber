<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chamber is a desktop workspace for creating and running AI agents."
    />
    <link rel="icon" type="image/svg+xml" href="/assets/app.svg" />
    <title>Chamber</title>
    <script>
      // Resolve theme before first paint so we don't flash the wrong scheme.
      (function () {
        try {
          var stored = localStorage.getItem('chamber.theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
      }
      html.dark body {
        background: #09090b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
